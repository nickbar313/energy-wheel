<!DOCTYPE html>
<html>
<head>
  <title>Hazard Details</title>
</head>
<body>
  <h1 id="title"></h1>
  <p id="info"></p>

  <a href="index.html">Back to wheel</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hazard = params.get("hazard");

    const info = {
      "Gravity": "Gravity hazards include falling objects, slips, trips, falls, and work at heights.",
      "Mechanical": "Mechanical hazards include moving parts, pinch points, rotating equipment, and stored energy.",
      "Electrical": "Electrical hazards include shock, arc flash, exposed conductors, and energized equipment.",
      "Pressure": "Pressure hazards include compressed gases, pressurized systems, hoses, lines, and vessels.",
      "Temperature": "Temperature hazards include hot surfaces, cold stress, burns, steam, and thermal energy.",
      "Chemical": "Chemical hazards include WHMIS products, fumes, vapours, corrosives, flammables, and toxic materials.",
      "Biological": "Biological hazards include bacteria, viruses, mould, bodily fluids, and contaminated materials.",
      "Radiation": "Radiation hazards include ionizing radiation, contamination, radioactive sources, and controlled areas.",
      "Sound": "Sound hazards include high noise levels, alarms, tools, equipment, and hearing protection concerns.",
      "Motion": "Motion hazards include moving vehicles, suspended loads, equipment travel paths, and struck-by hazards."
    };

    document.getElementById("title").textContent = hazard + " Hazards";
    document.getElementById("info").textContent = info[hazard] || "No details found.";
  </script>
</body>
</html>
