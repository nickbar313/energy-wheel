<!DOCTYPE html>
<html>
<head>
  <title>Hazard Details</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
      line-height: 1.5;
    }

    .card {
      max-width: 700px;
      margin: 40px auto;
      background: #1c1c1c;
      border: 2px solid #73d900;
      border-radius: 18px;
      padding: 30px;
    }

    h1 {
      color: #73d900;
    }

    a {
      color: #73d900;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title"></h1>
    <p id="info"></p>

    <h2>Examples:</h2>
    <ul id="examples"></ul>

    <br>
    <a href="index.html">Back to hazard wheel</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hazard = params.get("hazard");

    const hazardInfo = {
      "Gravity": {
        info: "Gravity hazards involve falling, dropped objects, elevation changes, and anything that can move downward because of gravity.",
        examples: ["Work at heights", "Falling tools", "Slips, trips, and falls", "Open holes or edges"]
      },
      "Mechanical": {
        info: "Mechanical hazards involve moving parts, rotating equipment, stored mechanical energy, and pinch points.",
        examples: ["Rotating shafts", "Conveyors", "Pinch points", "Unguarded equipment"]
      },
      "Electrical": {
        info: "Electrical hazards involve energized equipment, exposed conductors, shock, arc flash, and improper isolation.",
        examples: ["Live panels", "Damaged cords", "Arc flash potential", "Poor lockout/tagout"]
      },
      "Pressure": {
        info: "Pressure hazards involve compressed gases, pressurized lines, hydraulic systems, pneumatic systems, and vessels.",
        examples: ["Compressed air", "Pressurized hoses", "Hydraulic lines", "Gas cylinders"]
      },
      "Temperature": {
        info: "Temperature hazards involve hot or cold surfaces, steam, thermal stress, burns, and extreme environments.",
        examples: ["Hot pipes", "Steam systems", "Cold stress", "Heated equipment"]
      },
      "Chemical": {
        info: "Chemical hazards involve hazardous products, vapours, fumes, corrosives, flammables, toxics, and WHMIS-controlled materials.",
        examples: ["Solvents", "Acids", "Paints", "Cleaning products"]
      },
      "Biological": {
        info: "Biological hazards involve bacteria, viruses, mould, bodily fluids, contaminated materials, and other biohazards.",
        examples: ["Mould", "Sewage", "Animal waste", "Contaminated materials"]
      },
      "Radiation": {
        info: "Radiation hazards involve ionizing radiation, contamination, radioactive sources, and radiological work areas.",
        examples: ["Radiation fields", "Contamination", "Radioactive sources", "Controlled areas"]
      },
      "Sound": {
        info: "Sound hazards involve high noise levels that may damage hearing or interfere with communication.",
        examples: ["Loud tools", "Alarms", "Heavy equipment", "High-noise work areas"]
      },
      "Motion": {
        info: "Motion hazards involve moving vehicles, equipment, suspended loads, travel paths, and struck-by hazards.",
        examples: ["Forklifts", "Cranes", "Moving vehicles", "Swinging loads"]
      }
    };

    const selected = hazardInfo[hazard];

    document.getElementById("title").textContent = hazard + " Hazards";

    if (selected) {
      document.getElementById("info").textContent = selected.info;

      selected.examples.forEach(example => {
        const li = document.createElement("li");
        li.textContent = example;
        document.getElementById("examples").appendChild(li);
      });
    } else {
      document.getElementById("info").textContent = "No details found.";
    }
  </script>
</body>
</html>
