<!DOCTYPE html>
<html>
<head>
  <title>Safety Basics Hazard Wheel</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .company-logo {
      position: fixed;
      top: 22px;
      left: 22px;
      width: 190px;
      height: auto;
      background: white;
      padding: 6px;
      border-radius: 4px;
      z-index: 10;
    }

    h1 {
      margin-top: 35px;
    }

    p {
      color: #ddd;
      margin-bottom: 10px;
    }

    svg {
      width: 95vw;
      max-width: 650px;
      height: auto;
    }

    .slice {
      cursor: pointer;
      transition: filter 0.25s ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .slice:hover .wedge {
      fill: #eaffd8;
    }

    .slice.selected {
      filter: drop-shadow(0 0 12px #7cff00);
    }

    .wedge {
      fill: #f4f4ef;
      stroke: #12332b;
      stroke-width: 3;
    }

    .outer-ring {
      fill: #102b26;
      stroke: #6dde00;
      stroke-width: 6;
    }

    .icon-circle {
      fill: #73d900;
    }

    .icon-text {
      font-size: 24px;
      font-weight: bold;
      fill: #12332b;
      pointer-events: none;
    }

    .outer-label {
      fill: white;
      font-size: 13px;
      font-weight: bold;
      pointer-events: auto;
      cursor: pointer;
      dominant-baseline: middle;
    }

    .center-circle {
      fill: #f4f4ef;
      stroke: #12332b;
      stroke-width: 8;
    }

    .center-text {
      fill: #12332b;
      font-size: 14px;
      font-weight: bold;
      pointer-events: none;
    }

    .center-warning {
      fill: #73d900;
      stroke: #12332b;
      stroke-width: 3;
    }

    .effect-deco {
      pointer-events: none;
      opacity: 0;
    }

    .electrical-spark {
      fill: none;
      stroke: #fff36a;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px #fff36a);
    }

    .bio-bubble {
      fill: rgba(115, 217, 0, 0.25);
      stroke: #73d900;
      stroke-width: 2.5;
      filter: drop-shadow(0 0 8px #73d900);
      transform-box: fill-box;
      transform-origin: center;
    }

    .gravity-click {
      animation: gravityShrinkToBase 0.85s ease forwards;
    }

    .mechanical-click {
      animation: mechanicalCircleSpin 0.95s ease forwards;
    }

    .electrical-click {
      animation: electricalFlash 0.95s ease forwards;
    }

    .electrical-click .spark-1 {
      animation: sparkOne 0.95s ease-out forwards;
    }

    .electrical-click .spark-2 {
      animation: sparkTwo 0.95s ease-out forwards;
    }

    .electrical-click .spark-3 {
      animation: sparkThree 0.95s ease-out forwards;
    }

    .pressure-click {
      animation: pressureVibrateBurst 0.9s ease forwards;
    }

    .temperature-click {
      animation: temperatureRise 0.95s ease forwards;
    }

    .temperature-click .wedge {
      animation: temperatureWedgeRed 0.95s ease forwards;
    }

    .temperature-click .icon-circle {
      animation: temperatureIconRed 0.95s ease forwards;
    }

    .chemical-click {
      animation: chemicalDisintegrate 0.95s ease forwards;
    }

    .biological-click {
      animation: biologicalBubblePulse 1.4s ease forwards;
    }

    .biological-click .bubble-1 {
      animation: bioBubblePop 1.4s ease-out 0s forwards;
    }

    .biological-click .bubble-2 {
      animation: bioBubblePop 1.4s ease-out 0.12s forwards;
    }

    .biological-click .bubble-3 {
      animation: bioBubblePop 1.4s ease-out 0.24s forwards;
    }

    .biological-click .bubble-4 {
      animation: bioBubblePop 1.4s ease-out 0.36s forwards;
    }

    .biological-click .bubble-5 {
      animation: bioBubblePop 1.4s ease-out 0.48s forwards;
    }

    .biological-click .bubble-6 {
      animation: bioBubblePop 1.4s ease-out 0.6s forwards;
    }

    .radiation-click {
      animation: radiationSlowGlow 1.1s ease-in-out forwards;
    }

    .sound-click {
      animation: soundWave 0.85s ease forwards;
    }

    .motion-click {
      animation: motionVibrate 0.85s ease forwards;
    }

    @keyframes gravityShrinkToBase {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      35% {
        transform: translate(var(--move-x), calc(var(--move-y) + 18px)) scale(0.9);
        filter: brightness(1.15);
      }
      70% {
        transform: translate(var(--move-x), calc(var(--move-y) + 32px)) scale(0.65);
        filter: brightness(0.95);
      }
      100% {
        transform: translate(var(--move-x), calc(var(--move-y) + 38px)) scale(0.55);
        filter: brightness(0.85);
      }
    }

    @keyframes mechanicalCircleSpin {
      0% {
        transform: translate(0px, 0px) rotate(0deg) scale(1);
        filter: brightness(1);
      }
      20% {
        transform: translate(var(--move-x), var(--move-y)) rotate(120deg) scale(1.03);
      }
      40% {
        transform: translate(var(--move-x), var(--move-y)) rotate(240deg) scale(1.05);
      }
      60% {
        transform: translate(var(--move-x), var(--move-y)) rotate(360deg) scale(1.06);
      }
      80% {
        transform: translate(var(--move-x), var(--move-y)) rotate(540deg) scale(1.03);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) rotate(720deg) scale(1);
        filter: brightness(1.05);
      }
    }

    @keyframes electricalFlash {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      20% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.06);
        filter: brightness(2.2) drop-shadow(0 0 18px #ffff66);
      }
      45% {
        transform: translate(var(--move-x), var(--move-y)) scale(0.99);
        filter: brightness(1.15);
      }
      70% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.05);
        filter: brightness(2) drop-shadow(0 0 18px #ffff66);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
        filter: brightness(1.2);
      }
    }

    @keyframes sparkOne {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }
      20% {
        opacity: 1;
        transform: scale(1.1);
      }
      50% {
        opacity: 0.9;
        transform: scale(1.35);
      }
      100% {
        opacity: 0;
        transform: scale(1.6);
      }
    }

    @keyframes sparkTwo {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }
      28% {
        opacity: 1;
        transform: scale(1.05);
      }
      55% {
        opacity: 0.85;
        transform: scale(1.25);
      }
      100% {
        opacity: 0;
        transform: scale(1.55);
      }
    }

    @keyframes sparkThree {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }
      35% {
        opacity: 1;
        transform: scale(1.05);
      }
      62% {
        opacity: 0.8;
        transform: scale(1.2);
      }
      100% {
        opacity: 0;
        transform: scale(1.5);
      }
    }

    @keyframes pressureVibrateBurst {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      15% {
        transform: translate(5px, -3px) scale(1.02);
      }
      30% {
        transform: translate(-5px, 3px) scale(1.03);
      }
      45% {
        transform: translate(4px, -4px) scale(1.04);
      }
      60% {
        transform: translate(-4px, 4px) scale(1.05);
        filter: brightness(1.25);
      }
      78% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.28);
        filter: brightness(1.8) drop-shadow(0 0 18px #73d900);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
        filter: brightness(1.15);
      }
    }

    @keyframes temperatureRise {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.04);
        filter: brightness(1.25);
      }
    }

    @keyframes temperatureWedgeRed {
      0% {
        fill: #f4f4ef;
      }
      35% {
        fill: #ffd6b3;
      }
      70% {
        fill: #ff8a5c;
      }
      100% {
        fill: #ff3b30;
      }
    }

    @keyframes temperatureIconRed {
      0% {
        fill: #73d900;
      }
      35% {
        fill: #ffb347;
      }
      70% {
        fill: #ff6b3a;
      }
      100% {
        fill: #ff2d20;
      }
    }

    @keyframes chemicalDisintegrate {
      0% {
        transform: translate(0px, 0px) scale(1);
        opacity: 1;
        filter: blur(0px) brightness(1);
      }
      25% {
        transform: translate(var(--move-x), var(--move-y)) rotate(4deg) scale(1.04);
        opacity: 0.9;
        filter: blur(0.5px) brightness(1.2);
      }
      50% {
        transform: translate(var(--move-x), calc(var(--move-y) - 8px)) rotate(-8deg) scale(0.92);
        opacity: 0.65;
        filter: blur(1.5px) brightness(1.35);
      }
      75% {
        transform: translate(calc(var(--move-x) + 8px), calc(var(--move-y) - 14px)) rotate(10deg) scale(0.72);
        opacity: 0.35;
        filter: blur(3px) brightness(1.1);
      }
      100% {
        transform: translate(calc(var(--move-x) - 10px), calc(var(--move-y) - 20px)) rotate(-12deg) scale(0.5);
        opacity: 0.12;
        filter: blur(5px) brightness(0.9);
      }
    }

    @keyframes biologicalBubblePulse {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      35% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.04);
        filter: brightness(1.25) drop-shadow(0 0 14px #73d900);
      }
      70% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.02);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
        filter: brightness(1.08);
      }
    }

    @keyframes bioBubblePop {
      0% {
        opacity: 0;
        transform: translate(0px, 0px) scale(0.1);
      }
      15% {
        opacity: 1;
        transform: translate(calc(var(--bubble-x) * 0.2), calc(var(--bubble-y) * 0.2)) scale(0.45);
      }
      45% {
        opacity: 0.95;
        transform: translate(calc(var(--bubble-x) * 0.6), calc(var(--bubble-y) * 0.6)) scale(0.9);
      }
      75% {
        opacity: 0.9;
        transform: translate(var(--bubble-x), var(--bubble-y)) scale(1.25);
      }
      88% {
        opacity: 1;
        transform: translate(var(--bubble-x), var(--bubble-y)) scale(1.55);
      }
      100% {
        opacity: 0;
        transform: translate(var(--bubble-x), var(--bubble-y)) scale(0.15);
      }
    }

    @keyframes radiationSlowGlow {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(0.95) drop-shadow(0 0 2px #73d900);
      }
      25% {
        transform: translate(0px, 0px) scale(1.01);
        filter: brightness(1.5) drop-shadow(0 0 10px #73d900);
      }
      50% {
        transform: translate(0px, 0px) scale(1.02);
        filter: brightness(2.1) drop-shadow(0 0 20px #73d900);
      }
      75% {
        transform: translate(0px, 0px) scale(1.01);
        filter: brightness(1.45) drop-shadow(0 0 10px #73d900);
      }
      100% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(0.95) drop-shadow(0 0 3px #73d900);
      }
    }

    @keyframes soundWave {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      25% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.03);
      }
      50% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.12);
        filter: brightness(1.45);
      }
      75% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.03);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }

    @keyframes motionVibrate {
      0% {
        transform: translate(0px, 0px);
      }
      10% {
        transform: translate(5px, 0px);
      }
      20% {
        transform: translate(-5px, 0px);
      }
      30% {
        transform: translate(4px, -2px);
      }
      40% {
        transform: translate(-4px, 2px);
      }
      50% {
        transform: translate(6px, 0px);
      }
      60% {
        transform: translate(-6px, 0px);
      }
      70% {
        transform: translate(3px, -1px);
      }
      80% {
        transform: translate(-3px, 1px);
      }
      100% {
        transform: translate(0px, 0px);
      }
    }
  </style>
</head>

<body>
  <img class="company-logo" src="bmd-logo.jpg" alt="Black & McDonald logo">

  <h1>Safety Basics Hazard Wheel</h1>
  <p>Click a hazard category to learn more.</p>

  <svg id="wheel" viewBox="0 0 500 500"></svg>

  <script>
    const hazards = [
      { name: "Gravity", icon: "⬇" },
      { name: "Mechanical", icon: "⚙" },
      { name: "Electrical", icon: "⚡" },
      { name: "Pressure", icon: "⏱" },
      { name: "Temperature", icon: "🌡" },
      { name: "Chemical", icon: "🧪" },
      { name: "Biological", icon: "☣" },
      { name: "Radiation", icon: "☢" },
      { name: "Sound", icon: "🔊" },
      { name: "Motion", icon: "↔" }
    ];

    const animationClasses = {
      "Gravity": "gravity-click",
      "Mechanical": "mechanical-click",
      "Electrical": "electrical-click",
      "Pressure": "pressure-click",
      "Temperature": "temperature-click",
      "Chemical": "chemical-click",
      "Biological": "biological-click",
      "Radiation": "radiation-click",
      "Sound": "sound-click",
      "Motion": "motion-click"
    };

    const allAnimationClasses = Object.values(animationClasses);

    const svg = document.getElementById("wheel");

    const cx = 250;
    const cy = 250;
    const innerR = 85;
    const outerR = 185;
    const ringR = 225;
    const iconR = 135;
    const labelR = 198;
    const sliceAngle = 360 / hazards.length;

    function polarToCartesian(radius, angleDeg) {
      const angleRad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(angleRad),
        y: cy + radius * Math.sin(angleRad)
      };
    }

    function describeSlice(startAngle, endAngle) {
      const outerStart = polarToCartesian(outerR, startAngle);
      const outerEnd = polarToCartesian(outerR, endAngle);
      const innerStart = polarToCartesian(innerR, startAngle);
      const innerEnd = polarToCartesian(innerR, endAngle);

      return `
        M ${outerStart.x} ${outerStart.y}
        A ${outerR} ${outerR} 0 0 1 ${outerEnd.x} ${outerEnd.y}
        L ${innerEnd.x} ${innerEnd.y}
        A ${innerR} ${innerR} 0 0 0 ${innerStart.x} ${innerStart.y}
        Z
      `;
    }

    function makeSvgElement(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const key in attrs) {
        el.setAttribute(key, attrs[key]);
      }
      return el;
    }

    svg.appendChild(makeSvgElement("circle", {
      cx,
      cy,
      r: ringR,
      class: "outer-ring"
    }));

    hazards.forEach((hazard, index) => {
      const startAngle = index * sliceAngle - sliceAngle / 2;
      const endAngle = startAngle + sliceAngle;
      const midAngle = startAngle + sliceAngle / 2;

      const group = makeSvgElement("g", {
        class: "slice",
        "data-name": hazard.name
      });

      group.addEventListener("click", function (event) {
        event.stopPropagation();
        handleSliceClick(group, hazard.name, midAngle);
      });

      const path = makeSvgElement("path", {
        d: describeSlice(startAngle, endAngle),
        class: "wedge"
      });

      const iconPoint = polarToCartesian(iconR, midAngle);

      group.appendChild(path);

      if (hazard.name === "Biological") {
        const bubbleData = [
          { className: "bubble-1", r: 5, x: -6, y: -30 },
          { className: "bubble-2", r: 7, x: 11, y: -38 },
          { className: "bubble-3", r: 4, x: -16, y: -21 },
          { className: "bubble-4", r: 6, x: 18, y: -24 },
          { className: "bubble-5", r: 5, x: 2, y: -46 },
          { className: "bubble-6", r: 3.5, x: -2, y: -16 }
        ];

        bubbleData.forEach(bubble => {
          const bubbleEl = makeSvgElement("circle", {
            cx: iconPoint.x,
            cy: iconPoint.y,
            r: bubble.r,
            class: `effect-deco bio-bubble ${bubble.className}`,
            style: `--bubble-x: ${bubble.x}px; --bubble-y: ${bubble.y}px;`
          });

          group.appendChild(bubbleEl);
        });
      }

      if (hazard.name === "Electrical") {
        const spark1 = makeSvgElement("polyline", {
          points: `${iconPoint.x - 20},${iconPoint.y - 28} ${iconPoint.x - 6},${iconPoint.y - 10} ${iconPoint.x - 14},${iconPoint.y - 10} ${iconPoint.x - 2},${iconPoint.y + 8}`,
          class: "effect-deco electrical-spark spark-1"
        });

        const spark2 = makeSvgElement("polyline", {
          points: `${iconPoint.x + 22},${iconPoint.y - 18} ${iconPoint.x + 8},${iconPoint.y - 2} ${iconPoint.x + 16},${iconPoint.y - 2} ${iconPoint.x + 2},${iconPoint.y + 16}`,
          class: "effect-deco electrical-spark spark-2"
        });

        const spark3 = makeSvgElement("polyline", {
          points: `${iconPoint.x - 4},${iconPoint.y + 30} ${iconPoint.x + 8},${iconPoint.y + 12} ${iconPoint.x + 1},${iconPoint.y + 12} ${iconPoint.x + 14},${iconPoint.y - 6}`,
          class: "effect-deco electrical-spark spark-3"
        });

        group.appendChild(spark1);
        group.appendChild(spark2);
        group.appendChild(spark3);
      }

      const iconCircle = makeSvgElement("circle", {
        cx: iconPoint.x,
        cy: iconPoint.y,
        r: 28,
        class: "icon-circle"
      });

      const iconText = makeSvgElement("text", {
        x: iconPoint.x,
        y: iconPoint.y + 8,
        "text-anchor": "middle",
        class: "icon-text"
      });

      iconText.textContent = hazard.icon;

      group.appendChild(iconCircle);
      group.appendChild(iconText);

      const labelPoint = polarToCartesian(labelR, midAngle);

      let labelRotation = midAngle;
      if (labelRotation > 90 && labelRotation < 270) {
        labelRotation += 180;
      }

      const label = makeSvgElement("text", {
        x: labelPoint.x,
        y: labelPoint.y,
        "text-anchor": "middle",
        "dominant-baseline": "middle",
        class: "outer-label",
        transform: `rotate(${labelRotation}, ${labelPoint.x}, ${labelPoint.y})`
      });

      label.textContent = hazard.name;
      group.appendChild(label);

      svg.appendChild(group);
    });

    svg.appendChild(makeSvgElement("circle", {
      cx,
      cy,
      r: 68,
      class: "center-circle"
    }));

    svg.appendChild(makeSvgElement("path", {
      d: "M250 185 L305 285 L195 285 Z",
      class: "center-warning"
    }));

    const exclamation = makeSvgElement("text", {
      x: 250,
      y: 235,
      "text-anchor": "middle",
      class: "center-text"
    });
    exclamation.textContent = "!";
    exclamation.setAttribute("font-size", "32");
    svg.appendChild(exclamation);

    const centerText1 = makeSvgElement("text", {
      x: 250,
      y: 258,
      "text-anchor": "middle",
      class: "center-text"
    });
    centerText1.textContent = "Safety";
    svg.appendChild(centerText1);

    const centerText2 = makeSvgElement("text", {
      x: 250,
      y: 275,
      "text-anchor": "middle",
      class: "center-text"
    });
    centerText2.textContent = "basics";
    svg.appendChild(centerText2);

    const centerText3 = makeSvgElement("text", {
      x: 250,
      y: 305,
      "text-anchor": "middle",
      class: "center-text"
    });
    centerText3.textContent = "Identify";
    svg.appendChild(centerText3);

    function handleSliceClick(group, hazardName, angle) {
      const destination = "details.html?hazard=" + encodeURIComponent(hazardName);

      document.querySelectorAll(".slice").forEach(slice => {
        slice.classList.remove("selected", ...allAnimationClasses);
        slice.style.removeProperty("--move-x");
        slice.style.removeProperty("--move-y");
      });

      group.classList.add("selected");

      const angleRad = (angle - 90) * Math.PI / 180;
      const moveX = Math.cos(angleRad) * 16;
      const moveY = Math.sin(angleRad) * 16;

      group.style.setProperty("--move-x", `${moveX}px`);
      group.style.setProperty("--move-y", `${moveY}px`);

      const animationClass = animationClasses[hazardName];

      if (animationClass) {
        group.classList.add(animationClass);
      }

      const navigationDelay = hazardName === "Biological" ? 2100 : 850;

      setTimeout(function () {
        window.location.href = destination;
      }, navigationDelay);
    }
  </script>
</body>
</html>
