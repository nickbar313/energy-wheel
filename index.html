<!DOCTYPE html>
<html>
<head>
  <title>Safety Basics Hazard Wheel</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    p {
      color: #ddd;
    }

    svg {
      width: 95vw;
      max-width: 650px;
      height: auto;
    }

    .slice {
      cursor: pointer;
      transition: filter 0.25s ease;
      transform-box: view-box;
      transform-origin: center;
    }

    .slice:hover .wedge {
      fill: #eaffd8;
    }

    .slice.selected {
      filter: drop-shadow(0 0 12px #7cff00);
    }

    .wedge {
      fill: #f4f4ef;
      stroke: #12332b;
      stroke-width: 3;
    }

    .outer-ring {
      fill: #102b26;
      stroke: #6dde00;
      stroke-width: 6;
    }

    .icon-circle {
      fill: #73d900;
    }

    .icon-text {
      font-size: 24px;
      font-weight: bold;
      fill: #12332b;
      pointer-events: none;
    }

    .outer-label {
      fill: white;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
    }

    .center-circle {
      fill: #f4f4ef;
      stroke: #12332b;
      stroke-width: 8;
    }

    .center-text {
      fill: #12332b;
      font-size: 14px;
      font-weight: bold;
      pointer-events: none;
    }

    .center-warning {
      fill: #73d900;
      stroke: #12332b;
      stroke-width: 3;
    }

    /* Different click animations by hazard type */

    .gravity-click {
      animation: gravityDrop 0.75s ease forwards;
    }

    .mechanical-click {
      animation: mechanicalTurn 0.75s ease forwards;
    }

    .electrical-click {
      animation: electricalFlash 0.75s ease forwards;
    }

    .pressure-click {
      animation: pressureBurst 0.75s ease forwards;
    }

    .temperature-click {
      animation: heatWave 0.75s ease forwards;
    }

    .chemical-click {
      animation: chemicalBubble 0.75s ease forwards;
    }

    .biological-click {
      animation: biologicalPulse 0.75s ease forwards;
    }

    .radiation-click {
      animation: radiationSpin 0.75s ease forwards;
    }

    .sound-click {
      animation: soundWave 0.75s ease forwards;
    }

    .motion-click {
      animation: motionSlide 0.75s ease forwards;
    }

    @keyframes gravityDrop {
      0% {
        transform: translate(0px, 0px);
      }
      45% {
        transform: translate(var(--move-x), calc(var(--move-y) + 18px)) scale(1.04);
      }
      70% {
        transform: translate(var(--move-x), calc(var(--move-y) - 5px)) scale(0.98);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }

    @keyframes mechanicalTurn {
      0% {
        transform: translate(0px, 0px) rotate(0deg);
      }
      50% {
        transform: translate(var(--move-x), var(--move-y)) rotate(12deg) scale(1.04);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) rotate(0deg) scale(1);
      }
    }

    @keyframes electricalFlash {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      25% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.08);
        filter: brightness(2) drop-shadow(0 0 16px #ffff66);
      }
      50% {
        transform: translate(var(--move-x), var(--move-y)) scale(0.98);
        filter: brightness(1.1);
      }
      75% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.06);
        filter: brightness(2) drop-shadow(0 0 16px #ffff66);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
        filter: brightness(1.2);
      }
    }

    @keyframes pressureBurst {
      0% {
        transform: translate(0px, 0px) scale(1);
      }
      40% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.14);
      }
      70% {
        transform: translate(var(--move-x), var(--move-y)) scale(0.96);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }

    @keyframes heatWave {
      0% {
        transform: translate(0px, 0px) skewX(0deg);
        filter: brightness(1);
      }
      30% {
        transform: translate(var(--move-x), var(--move-y)) skewX(5deg) scale(1.04);
        filter: brightness(1.4);
      }
      60% {
        transform: translate(var(--move-x), var(--move-y)) skewX(-5deg) scale(1.03);
        filter: brightness(1.25);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) skewX(0deg) scale(1);
        filter: brightness(1.1);
      }
    }

    @keyframes chemicalBubble {
      0% {
        transform: translate(0px, 0px) scale(1);
      }
      30% {
        transform: translate(var(--move-x), calc(var(--move-y) - 10px)) scale(1.07);
      }
      60% {
        transform: translate(var(--move-x), calc(var(--move-y) + 5px)) scale(0.98);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }

    @keyframes biologicalPulse {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      35% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.1);
        filter: brightness(1.35) drop-shadow(0 0 14px #73d900);
      }
      70% {
        transform: translate(var(--move-x), var(--move-y)) scale(0.97);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }

    @keyframes radiationSpin {
      0% {
        transform: translate(0px, 0px) rotate(0deg) scale(1);
      }
      45% {
        transform: translate(var(--move-x), var(--move-y)) rotate(18deg) scale(1.08);
        filter: drop-shadow(0 0 16px #73d900);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) rotate(0deg) scale(1);
      }
    }

    @keyframes soundWave {
      0% {
        transform: translate(0px, 0px) scale(1);
        filter: brightness(1);
      }
      25% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.03);
      }
      50% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.12);
        filter: brightness(1.45);
      }
      75% {
        transform: translate(var(--move-x), var(--move-y)) scale(1.03);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }

    @keyframes motionSlide {
      0% {
        transform: translate(0px, 0px);
      }
      45% {
        transform: translate(calc(var(--move-x) * 2), var(--move-y)) scale(1.04);
      }
      70% {
        transform: translate(calc(var(--move-x) * 0.7), var(--move-y)) scale(0.98);
      }
      100% {
        transform: translate(var(--move-x), var(--move-y)) scale(1);
      }
    }
  </style>
</head>

<body>
  <h1>Safety Basics Hazard Wheel</h1>
  <p>Click a hazard category to learn more.</p>

  <svg id="wheel" viewBox="0 0 500 500"></svg>

  <script>
    const hazards = [
      { name: "Gravity", icon: "⬇" },
      { name: "Mechanical", icon: "⚙" },
      { name: "Electrical", icon: "⚡" },
      { name: "Pressure", icon: "⏱" },
      { name: "Temperature", icon: "🌡" },
      { name: "Chemical", icon: "⚗" },
      { name: "Biological", icon: "☣" },
      { name: "Radiation", icon: "☢" },
      { name: "Sound", icon: "🔊" },
      { name: "Motion", icon: "↔" }
    ];

    const animationClasses = {
      "Gravity": "gravity-click",
      "Mechanical": "mechanical-click",
      "Electrical": "electrical-click",
      "Pressure": "pressure-click",
      "Temperature": "temperature-click",
      "Chemical": "chemical-click",
      "Biological": "biological-click",
      "Radiation": "radiation-click",
      "Sound": "sound-click",
      "Motion": "motion-click"
    };

    const allAnimationClasses = Object.values(animationClasses);

    const svg = document.getElementById("wheel");

    const cx = 250;
    const cy = 250;
    const innerR = 85;
    const outerR = 185;
    const ringR = 225;
    const iconR = 135;

    // Smaller number = outside labels closer to center.
    const labelR = 198;

    const sliceAngle = 360 / hazards.length;

    function polarToCartesian(radius, angleDeg) {
      const angleRad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(angleRad),
        y: cy + radius * Math.sin(angleRad)
      };
    }

    function describeSlice(startAngle, endAngle) {
      const outerStart = polarToCartesian(outerR, startAngle);
      const outerEnd = polarToCartesian(outerR, endAngle);
      const innerStart = polarToCartesian(innerR, startAngle);
      const innerEnd = polarToCartesian(innerR, endAngle);

      return `
        M ${outerStart.x} ${outerStart.y}
        A ${outerR} ${outerR} 0 0 1 ${outerEnd.x} ${outerEnd.y}
        L ${innerEnd.x} ${innerEnd.y}
        A ${innerR} ${innerR} 0 0 0 ${innerStart.x} ${innerStart.y}
        Z
      `;
    }

    function makeSvgElement(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const key in attrs) {
        el.setAttribute(key, attrs[key]);
      }
      return el;
    }

    svg.appendChild(makeSvgElement("circle", {
      cx,
      cy,
      r: ringR,
      class: "outer-ring"
    }));

    hazards.forEach((hazard, index) => {
      const startAngle = index * sliceAngle - sliceAngle / 2;
      const endAngle = startAngle + sliceAngle;
      const midAngle = startAngle + sliceAngle / 2;

      const group = makeSvgElement("g", {
        class: "slice",
        "data-name": hazard.name
      });

      const path = makeSvgElement("path", {
        d: describeSlice(startAngle, endAngle),
        class: "wedge"
      });

      const iconPoint = polarToCartesian(iconR, midAngle);

      const iconCircle = makeSvgElement("circle", {
        cx: iconPoint.x,
        cy: iconPoint.y,
        r: 28,
        class: "icon-circle"
      });

      const iconText = makeSvgElement("text", {
        x: iconPoint.x,
        y: iconPoint.y + 8,
        "text-anchor": "middle",
        class: "icon-text"
      });

      iconText.textContent = hazard.icon;

      group.appendChild(path);
      group.appendChild(iconCircle);
      group.appendChild(iconText);

      group.addEventListener("click", function () {
        handleSliceClick(group, hazard.name, midAngle);
      });

      svg.appendChild(group);

      const labelPoint = polarToCartesian(labelR, midAngle);

      const label = makeSvgElement("text", {
        x: labelPoint.x,
        y: labelPoint.y,
        "text-anchor": "middle",
        class: "outer-label",
        transform: `rotate(${midAngle}, ${labelPoint.x}, ${labelPoint.y})`
      });

      label.textContent = hazard.name;
      svg.appendChild(label);
    });

    svg.appendChild(makeSvgElement("circle", {
      cx,
      cy,
      r: 68,
      class: "center-circle"
    }));

    svg.appendChild(makeSvgElement("path", {
      d: "M250 185 L305 285 L195 285 Z",
      class: "center-warning"
    }));

    const exclamation = makeSvgElement("text", {
      x: 250,
      y: 235,
      "text-anchor": "middle",
      class: "center-text"
    });
    exclamation.textContent = "!";
    exclamation.setAttribute("font-size", "32");
    svg.appendChild(exclamation);

    const centerText1 = makeSvgElement("text", {
      x: 250,
      y: 258,
      "text-anchor": "middle",
      class: "center-text"
    });
    centerText1.textContent = "Safety";
    svg.appendChild(centerText1);

    const centerText2 = makeSvgElement("text", {
      x: 250,
      y: 275,
      "text-anchor": "middle",
      class: "center-text"
    });
    centerText2.textContent = "basics";
    svg.appendChild(centerText2);

    const centerText3 = makeSvgElement("text", {
      x: 250,
      y: 305,
      "text-anchor": "middle",
      class: "center-text"
    });
    centerText3.textContent = "Identify";
    svg.appendChild(centerText3);

    function handleSliceClick(group, hazardName, angle) {
      document.querySelectorAll(".slice").forEach(slice => {
        slice.classList.remove("selected", ...allAnimationClasses);
        slice.style.removeProperty("--move-x");
        slice.style.removeProperty("--move-y");
      });

      group.classList.add("selected");

      const angleRad = (angle - 90) * Math.PI / 180;
      const moveX = Math.cos(angleRad) * 16;
      const moveY = Math.sin(angleRad) * 16;

      group.style.setProperty("--move-x", `${moveX}px`);
      group.style.setProperty("--move-y", `${moveY}px`);

      const animationClass = animationClasses[hazardName];
      group.classList.add(animationClass);

      setTimeout(function () {
        window.location.href =
          "details.html?hazard=" + encodeURIComponent(hazardName);
      }, 850);
    }
  </script>
</body>
</html>
